services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: linkword-backend
    ports:
      - "8001:8000"
    volumes:
      - ./backend/app:/app/app          # 代码热重载
      - ./model_files:/app/app/model_files:ro  # ONNX 模型文件
      - ./word_bank:/app/word_bank:ro   # 词库只读挂载
      - models:/app/models              # 模型持久化（避免每次重启重新下载）
    environment:
      - WORD_BANK_PATH=/app/word_bank/all.json
      - MODEL_NAME=BAAI/bge-small-zh-v1.5
      - MODEL_CACHE_DIR=/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: linkword-nginx
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  models:
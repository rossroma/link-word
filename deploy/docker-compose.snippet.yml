# ===== 猜词游戏 =====
  link-word:
    build: ./sites/link-word
    restart: always
    expose:
      - "8000"
    environment:
      - MAX_GUESSES=50
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
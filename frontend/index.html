<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>猜词游戏 - 语义相似度挑战</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="app">
        <header class="header">
            <button id="giveup-btn" class="header-giveup-btn" title="放弃" style="display: none;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="4" y1="21" x2="4" y2="3"></line>
                    <polyline points="4 4 16 4 12 9 16 14 4 14"></polyline>
                </svg>
            </button>
            <h1 class="title">猜词游戏</h1>
            <p class="subtitle">语义相似度挑战</p>
        </header>

        <main class="main">
            <!-- 目标词卡片（游戏结果也在此展示） -->
            <div class="target-card hidden" id="target-card">
                <div class="target-icon" id="target-icon">🎯</div>
                <div class="target-word" id="target-word"><i class="fa-solid fa-circle-question target-question-icon"></i></div>
                <div class="target-hint" id="target-hint">目标词隐藏中</div>
                <div class="target-result" id="target-result" style="display: none;">
                    <div class="target-result-stats" id="target-result-stats"></div>
                    <button class="target-result-btn" id="target-result-btn">再来一局</button>
                </div>
            </div>

            <!-- 错误提示 -->
            <div class="error-toast" id="error-toast" style="display: none;"></div>

            <!-- 欢迎状态（未开始猜测时展示） -->
            <div class="welcome-section" id="welcome-section">
                <div class="welcome-illustration">💡</div>
                <div class="welcome-title">输入一个中文词汇开始挑战</div>
                <div class="welcome-desc">
                    系统会返回 <strong>0–100</strong> 的语义相似度分数<br>
                    分数越高越接近目标词，试着<strong>一步步逼近</strong>吧！
                </div>
            </div>

            <!-- 分数反馈横幅 -->
            <div class="feedback-banner" id="feedback-banner" style="display: none;"></div>

            <!-- 猜测历史（有猜测后才显示） -->
            <div class="history-section" id="history-section" style="display: none;">
                <div class="history-header">
                    <span>猜测历史</span>
                    <span class="history-count" id="history-count">0 次</span>
                </div>
                <div class="history-list" id="history-list">
                </div>
            </div>
        </main>

        <footer class="footer">
            <input
                type="text"
                id="guess-input"
                class="guess-input"
                inputmode="text"
                autocomplete="off"
                autocorrect="off"
                autocapitalize="off"
                spellcheck="false"
                placeholder="输入你的猜测..."
                maxlength="4"
            >
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
